name: SwallpaperWorkshopLite
options:
  bundleIdPrefix: com.swallpaper
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.4"
schemes:
  SwallpaperWorkshopLite:
    build:
      targets:
        SwallpaperWorkshopLite: all
packages: {}
settings:
  base:
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
targets:
  SwallpaperWorkshopLite:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Views
    settings:
      base:
        PRODUCT_NAME: SwallpaperWorkshopLite
        PRODUCT_BUNDLE_IDENTIFIER: com.swallpaper.workshoplite
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: App/Info.plist
        LD_RUNPATH_SEARCH_PATHS: $(inherited) @executable_path/../Frameworks
    entitlements:
      path: Swallpaper.entitlements
      properties:
        com.apple.security.network.client: true
