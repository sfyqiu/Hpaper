name: Build DMG
on: workflow_dispatch
permissions:
  contents: write
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate
        run: xcodegen generate
      - name: Build
        run: |
          xcodebuild -scheme SwallpaperWorkshopLite -configuration Release clean archive \
            CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -archivePath build/app.xcarchive
          xcodebuild -exportArchive -archivePath build/app.xcarchive \
            -exportPath build -exportOptionsPlist <(echo '<?xml version="1.0"?><plist><dict><key>method</key><string>mac-application</string></dict></plist>') \
            CODE_SIGN_IDENTITY="-" CODE_SIGNING_ALLOWED=NO
      - name: DMG
        run: |
          hdiutil create -volname "SwallpaperWorkshopLite" \
            -srcfolder build/SwallpaperWorkshopLite.app \
            -ov -format UDZO build/SwallpaperWorkshopLite.dmg
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v$(cat VERSION)
          files: build/SwallpaperWorkshopLite.dmg
